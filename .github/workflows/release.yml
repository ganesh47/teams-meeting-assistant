name: Release Prep

on:
  workflow_dispatch:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository metadata
        run: |
          test -f README.md
          test -f LICENSE
          test -d .github/workflows
          echo 'release prep ok'
