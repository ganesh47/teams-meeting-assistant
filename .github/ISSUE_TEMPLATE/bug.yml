name: Bug
description: Report a defect or reliability issue
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser, meeting type, and anything else relevant
